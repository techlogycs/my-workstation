---
- name: Install VS Code and Brave from official repositories
  ansible.builtin.apt:
    name: >-
      {{
        ([ 'code' ] if common_enable_vscode else [])
        + ([ 'brave-browser' ] if common_enable_brave else [])
      }}
    state: present
  when: common_enable_vscode or common_enable_brave
  tags:
    - applications
    - vscode
    - brave

- name: Ensure the VS Code runtime arguments directory exists
  ansible.builtin.file:
    path: "{{ local_home }}/.vscode"
    state: directory
    mode: "0755"
  become: true
  become_user: "{{ local_user }}"
  when:
    - common_enable_vscode
    - ansible_distribution == 'Pop!_OS'
  tags:
    - applications
    - vscode

- name: Check whether VS Code runtime arguments file exists
  ansible.builtin.stat:
    path: "{{ local_home }}/.vscode/argv.json"
  register: desktop_apps_vscode_argv_stat
  when:
    - common_enable_vscode
    - ansible_distribution == 'Pop!_OS'
  tags:
    - applications
    - vscode

- name: Load current VS Code runtime arguments
  when:
    - common_enable_vscode
    - ansible_distribution == 'Pop!_OS'
    - desktop_apps_vscode_argv_stat.stat.exists
  tags:
    - applications
    - vscode
  block:
    - name: Read current VS Code runtime arguments
      ansible.builtin.slurp:
        path: "{{ local_home }}/.vscode/argv.json"
      register: desktop_apps_vscode_argv_slurp

    - name: Normalize current VS Code runtime arguments JSONC
      ansible.builtin.set_fact:
        desktop_apps_vscode_argv_existing_json: >-
          {{
            (desktop_apps_vscode_argv_slurp.content | b64decode)
            | regex_replace('/\\*.*?\\*/', '', multiline=True)
            | regex_replace('(?m)^\\s*//.*$', '')
            | trim
          }}

    - name: Parse current VS Code runtime arguments
      ansible.builtin.set_fact:
        desktop_apps_vscode_argv_existing: >-
          {{
            (desktop_apps_vscode_argv_existing_json | length > 0)
            | ternary(desktop_apps_vscode_argv_existing_json | from_json, {})
          }}
  rescue:
    - name: Ignore invalid VS Code runtime arguments JSON and reset
      ansible.builtin.set_fact:
        desktop_apps_vscode_argv_existing: {}

- name: Compose effective VS Code runtime arguments for Pop!_OS
  ansible.builtin.set_fact:
    desktop_apps_vscode_argv_effective: >-
      {{
        (desktop_apps_vscode_argv_existing | default({}))
        | combine({'password-store': 'gnome-libsecret'}, recursive=True)
      }}
  when:
    - common_enable_vscode
    - ansible_distribution == 'Pop!_OS'
  tags:
    - applications
    - vscode

- name: Configure VS Code runtime arguments for keyring support on Pop!_OS
  ansible.builtin.copy:
    dest: "{{ local_home }}/.vscode/argv.json"
    content: "{{ desktop_apps_vscode_argv_effective | to_nice_json }}"
    mode: "0644"
  become: true
  become_user: "{{ local_user }}"
  when:
    - common_enable_vscode
    - ansible_distribution == 'Pop!_OS'
  tags:
    - applications
    - vscode

- name: Ensure RustDesk native packages are available for this architecture
  ansible.builtin.assert:
    that:
      - common_deb_arch in rustdesk_release_arch_map
    fail_msg: RustDesk publishes native Debian packages only for amd64 and arm64.
  tags:
    - applications
    - rustdesk

- name: Check whether RustDesk is still installed as a system Flatpak
  ansible.builtin.command:
    cmd: flatpak info --system com.rustdesk.RustDesk
  register: desktop_apps_rustdesk_flatpak_info
  changed_when: false
  failed_when: false
  when: "'flatpak' in ansible_facts.packages"
  tags:
    - applications
    - rustdesk

- name: Remove the system RustDesk Flatpak before installing the native package
  ansible.builtin.command:
    cmd: flatpak uninstall --system --noninteractive com.rustdesk.RustDesk
  changed_when: desktop_apps_rustdesk_flatpak_info.rc == 0
  when:
    - "'flatpak' in ansible_facts.packages"
    - desktop_apps_rustdesk_flatpak_info.rc == 0
  tags:
    - applications
    - rustdesk

- name: Download the pinned RustDesk Debian package
  ansible.builtin.get_url:
    url: >-
      https://github.com/rustdesk/rustdesk/releases/download/{{ rustdesk_version
      }}/{{ rustdesk_package_filename }}
    dest: /tmp/{{ rustdesk_package_filename }}
    mode: "0644"
    force: false
  vars:
    rustdesk_package_filename: >-
      rustdesk-{{ rustdesk_version }}-{{ rustdesk_release_arch_map[common_deb_arch] }}.deb
  tags:
    - applications
    - rustdesk

- name: Install RustDesk from the pinned upstream Debian package
  ansible.builtin.apt:
    deb: /tmp/{{ rustdesk_package_filename }}
    state: present
    update_cache: true
  vars:
    rustdesk_package_filename: >-
      rustdesk-{{ rustdesk_version }}-{{ rustdesk_release_arch_map[common_deb_arch] }}.deb
  tags:
    - applications
    - rustdesk

- name: Ensure the RustDesk system service is enabled and started
  ansible.builtin.systemd:
    name: rustdesk
    enabled: true
    state: started
    daemon_reload: true
  tags:
    - applications
    - rustdesk
