---
- name: Remove legacy VS Code source file with Signed-By keyring
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vscode.sources
    state: absent
  when: common_enable_vscode
  tags:
    - repos
    - vscode

- name: Add Microsoft APT signing key
  ansible.builtin.apt_key:
    url: https://packages.microsoft.com/keys/microsoft.asc
    state: present
  when: common_enable_vscode or common_enable_edge
  tags:
    - packages
    - system
    - repos
    - vscode
    - edge

- name: Register the VS Code repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ common_deb_arch }}] https://packages.microsoft.com/repos/code stable main"
    state: present
    filename: vscode
    update_cache: false
  when: common_enable_vscode
  tags:
    - repos
    - vscode

- name: Register the Microsoft Edge repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ common_deb_arch }}] https://packages.microsoft.com/repos/edge stable main"
    state: present
    filename: microsoft-edge-stable
    update_cache: false
  when: common_enable_edge
  tags:
    - packages
    - system
    - repos
    - edge

- name: Remove legacy Brave source file with Signed-By keyring
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/brave-browser-release.sources
    state: absent
  when: common_enable_brave
  tags:
    - repos
    - brave

- name: Add Brave APT signing key
  ansible.builtin.apt_key:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    state: present
  when: common_enable_brave
  tags:
    - repos
    - brave

- name: Register the Brave repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ common_deb_arch }}] https://brave-browser-apt-release.s3.brave.com/ stable main"
    state: present
    filename: brave-browser-release
    update_cache: false
  when: common_enable_brave
  tags:
    - repos
    - brave

- name: Remove legacy Docker source file with Signed-By keyring
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.sources
    state: absent
  when: common_enable_docker
  tags:
    - repos
    - docker

- name: Add Docker APT signing key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present
  when: common_enable_docker
  tags:
    - packages
    - system
    - repos
    - docker

- name: Register the Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ common_deb_arch }}] https://download.docker.com/linux/ubuntu
      {{ common_ubuntu_codename }} stable
    state: present
    filename: docker
    update_cache: false
  when: common_enable_docker
  tags:
    - packages
    - system
    - repos
    - docker

- name: Register the CopyQ PPA repository
  ansible.builtin.apt_repository:
    repo: ppa:hluk/copyq
    state: present
    update_cache: false
  when: common_install_copyq
  tags:
    - packages
    - system
    - repos
    - copyq

- name: Register the Git Core PPA repository
  ansible.builtin.apt_repository:
    repo: ppa:git-core/ppa
    state: present
    update_cache: false
  when:
    - ansible_distribution in supported_distributions
    - not common_selective_feature_run or common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - repos
    - git

- name: Update apt cache after adding external repositories
  ansible.builtin.apt:
    update_cache: true
  when: >-
    common_enable_vscode
    or common_enable_brave
    or common_enable_docker
    or common_enable_edge
    or common_install_copyq
    or (
      ansible_distribution in supported_distributions
      and (not common_selective_feature_run or common_enable_git_credential_oauth)
    )
  changed_when: false
  tags:
    - packages
    - system
    - repos
