---
- name: Ensure the APT keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: common_enable_vscode or common_enable_brave
  tags:
    - repos

- name: Ensure the system keyring directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    mode: "0755"
  when: common_enable_vscode or common_enable_brave or common_enable_docker
  tags:
    - repos
    - vscode
    - brave
    - docker

- name: Check if VS Code .list file exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/vscode.list
  register: vscode_list_stat
  when: common_enable_vscode
  tags:
    - repos
    - vscode

- name: Remove VS Code .list file if it exists
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/vscode.list
    state: absent
  when:
    - common_enable_vscode
    - vscode_list_stat.stat.exists
  tags:
    - repos
    - vscode

- name: Check if VS Code .sources file exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/vscode.sources
  register: vscode_sources_stat
  when: common_enable_vscode
  tags:
    - repos
    - vscode


- name: Download Microsoft APT signing key (ASCII)
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /tmp/microsoft.asc
    mode: "0644"
    force: false
  when: common_enable_vscode
  tags:
    - repos
    - vscode
  changed_when: false

- name: Convert Microsoft APT signing key to GPG keyring format (upstream location)
  ansible.builtin.command:
    cmd: gpg --dearmor --yes --output /usr/share/keyrings/microsoft.gpg /tmp/microsoft.asc
    creates: /usr/share/keyrings/microsoft.gpg
  when: common_enable_vscode
  changed_when: false
  tags:
    - repos
    - vscode

- name: Check if temporary Microsoft signing key file exists
  ansible.builtin.stat:
    path: /tmp/microsoft.asc
  register: microsoft_asc_stat
  when: common_enable_vscode
  tags:
    - repos
    - vscode

- name: Clean up temporary Microsoft APT signing key file if it exists
  ansible.builtin.file:
    path: /tmp/microsoft.asc
    state: absent
  when:
    - common_enable_vscode
    - microsoft_asc_stat.stat.exists
  changed_when: false
  tags:
    - repos
    - vscode

- name: Register the VS Code repository (upstream .sources style)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/vscode.sources
    content: |
      Types: deb
      URIs: https://packages.microsoft.com/repos/code
      Suites: stable
      Components: main
      Architectures: amd64,arm64,armhf
      Signed-By: /usr/share/keyrings/microsoft.gpg
    owner: root
    group: root
    mode: "0644"
  when: common_enable_vscode
  changed_when: false
  tags:
    - repos
    - vscode

- name: Check if Brave .list file exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/brave-browser-release.list
  register: brave_list_stat
  when: common_enable_brave
  tags:
    - repos
    - brave

- name: Remove Brave .list file if it exists
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/brave-browser-release.list
    state: absent
  when:
    - common_enable_brave
    - brave_list_stat.stat.exists
  tags:
    - repos
    - brave

- name: Check if Brave .sources file exists
  ansible.builtin.stat:
    path: /etc/apt/sources.list.d/brave-browser-release.sources
  register: brave_sources_stat
  when: common_enable_brave
  tags:
    - repos
    - brave


- name: Download Brave APT signing key into the system keyring location
  ansible.builtin.get_url:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    dest: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    mode: "0644"
    force: false
  when: common_enable_brave
  tags:
    - repos
    - brave
  changed_when: false

- name: Register the Brave repository via .sources file (upstream style)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/brave-browser-release.sources
    content: |
      Types: deb
      URIs: https://brave-browser-apt-release.s3.brave.com/
      Suites: stable
      Components: main
      Architectures: {{ common_deb_arch }}
      Signed-By: /usr/share/keyrings/brave-browser-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"
  when: common_enable_brave
  changed_when: false
  tags:
    - repos
    - brave

- name: Remove any old Docker .list file to prevent Signed-By conflicts
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.list
    state: absent
  when: common_enable_docker
  tags:
    - repos
    - docker


- name: Remove any existing Docker keyrings that might conflict
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    state: absent
  when: common_enable_docker
  tags:
    - repos
    - docker

- name: Remove any existing Docker gpg keyring that might conflict
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.gpg
    state: absent
  when: common_enable_docker
  tags:
    - repos
    - docker

- name: Download Docker APT signing key (ASCII)
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /tmp/docker.asc
    mode: "0644"
    force: false
  when: common_enable_docker
  tags:
    - repos
    - docker
  changed_when: false

- name: Convert Docker APT signing key to GPG keyring format
  ansible.builtin.shell: |
    rm -f /usr/share/keyrings/docker-archive-keyring.gpg
    gpg --dearmor --yes --output /usr/share/keyrings/docker-archive-keyring.gpg /tmp/docker.asc
  args:
    executable: /bin/bash
  when: common_enable_docker
  changed_when: false
  tags:
    - repos
    - docker

- name: Clean up temporary Docker signing key file
  ansible.builtin.file:
    path: /tmp/docker.asc
    state: absent
  when: common_enable_docker
  changed_when: false
  tags:
    - repos
    - docker

- name: Register the Docker repository via .sources file (upstream style)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ ansible_lsb.codename }}
      Components: stable
      Signed-By: /usr/share/keyrings/docker-archive-keyring.gpg
    owner: root
    group: root
    mode: "0644"
  when: common_enable_docker
  changed_when: false
  tags:
    - repos
    - docker

- name: Update apt cache after adding upstream .sources repositories
  ansible.builtin.apt:
    update_cache: true
  when: common_enable_vscode or common_enable_brave or common_enable_docker
  changed_when: false
  tags:
    - repos
