---
- name: Remove obsolete managed APT source definitions
  ansible.builtin.include_tasks: cleanup.yml
  tags:
    - repos
    - vscode
    - edge
    - brave
    - docker

- name: Ensure the APT keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: common_enable_vscode or common_enable_edge or common_enable_docker
  tags:
    - packages
    - system
    - repos
    - vscode
    - edge
    - docker

- name: Install the Microsoft APT signing key into a dedicated keyring
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    owner: root
    group: root
    mode: "0644"
    force: true
  when: common_enable_vscode or common_enable_edge
  tags:
    - packages
    - system
    - repos
    - vscode
    - edge

- name: Render the VS Code repository definition
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/vscode.list
    content: "{{ (vscode_repo_parts | join(' ')) ~ '\n' }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    vscode_repo_parts:
      - "deb [arch={{ common_deb_arch }} signed-by=/etc/apt/keyrings/microsoft.asc]"
      - https://packages.microsoft.com/repos/code
      - stable
      - main
  when: common_enable_vscode
  tags:
    - repos
    - vscode

- name: Render the Microsoft Edge repository definition
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/microsoft-edge-stable.list
    content: "{{ (edge_repo_parts | join(' ')) ~ '\n' }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    edge_repo_parts:
      - "deb [arch={{ common_deb_arch }} signed-by=/etc/apt/keyrings/microsoft.asc]"
      - https://packages.microsoft.com/repos/edge
      - stable
      - main
  when: common_enable_edge
  tags:
    - packages
    - system
    - repos
    - edge

- name: Remove legacy Brave source file with Signed-By keyring
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/brave-browser-release.sources
    state: absent
  when: common_enable_brave
  tags:
    - repos
    - brave

- name: Add Brave APT signing key
  ansible.builtin.apt_key:
    url: https://brave-browser-apt-release.s3.brave.com/brave-browser-archive-keyring.gpg
    state: present
  when: common_enable_brave
  tags:
    - repos
    - brave

- name: Register the Brave repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ common_deb_arch }}] https://brave-browser-apt-release.s3.brave.com/ stable main"
    state: present
    filename: brave-browser-release
    update_cache: false
  when: common_enable_brave
  tags:
    - repos
    - brave

- name: Remove legacy Docker source file with Signed-By keyring
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/docker.sources
    state: absent
  when: common_enable_docker
  tags:
    - repos
    - docker

- name: Install the Docker APT signing key into a dedicated keyring
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"
    force: true
  when: common_enable_docker
  tags:
    - packages
    - system
    - repos
    - docker

- name: Render the Docker repository definition
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "{{ (docker_repo_parts | join(' ')) ~ '\n' }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    docker_repo_parts:
      - "deb [arch={{ common_deb_arch }} signed-by=/etc/apt/keyrings/docker.asc]"
      - https://download.docker.com/linux/ubuntu
      - "{{ common_ubuntu_codename }}"
      - stable
  when: common_enable_docker
  tags:
    - packages
    - system
    - repos
    - docker

- name: Register the CopyQ PPA repository
  ansible.builtin.apt_repository:
    repo: ppa:hluk/copyq
    state: present
    update_cache: false
  when: common_install_copyq
  tags:
    - packages
    - system
    - repos
    - copyq

- name: Install the Git Core PPA signing key into a dedicated keyring
  ansible.builtin.get_url:
    url: >-
      https://keyserver.ubuntu.com/pks/lookup?op=get&search=0xF911AB184317630C59970973E363C90F8F1B6217
    dest: /etc/apt/keyrings/git-core-ppa.asc
    owner: root
    group: root
    mode: "0644"
    force: true
  when:
    - ansible_distribution in supported_distributions
    - not common_selective_feature_run or common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - repos
    - git

- name: Render the Git Core PPA repository definition
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/git-core-ppa.list
    content: "{{ (git_core_ppa_repo_parts | join(' ')) ~ '\n' }}"
    owner: root
    group: root
    mode: "0644"
  vars:
    git_core_ppa_repo_parts:
      - deb
      - "[signed-by=/etc/apt/keyrings/git-core-ppa.asc]"
      - https://ppa.launchpadcontent.net/git-core/ppa/ubuntu
      - "{{ common_ubuntu_codename }}"
      - main
  when:
    - ansible_distribution in supported_distributions
    - not common_selective_feature_run or common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - repos
    - git

- name: Update apt cache after adding external repositories
  ansible.builtin.apt:
    update_cache: true
  when: >-
    common_enable_vscode
    or common_enable_brave
    or common_enable_docker
    or common_enable_edge
    or common_install_copyq
    or (
      ansible_distribution in supported_distributions
      and (not common_selective_feature_run or common_enable_git_credential_oauth)
    )
  changed_when: false
  tags:
    - packages
    - system
    - repos
