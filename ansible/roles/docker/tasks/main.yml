---
- name: Ensure the Docker configuration directory exists
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    mode: "0755"
  when: common_enable_docker | default(false)
  tags:
    - docker

- name: Check whether Docker daemon configuration exists
  ansible.builtin.stat:
    path: /etc/docker/daemon.json
  register: docker_daemon_file
  when: common_enable_docker | default(false)
  tags:
    - docker

- name: Load the current Docker daemon configuration
  when:
    - common_enable_docker | default(false)
    - docker_daemon_file.stat.exists
  tags:
    - docker

  block:
    - name: Read the current Docker daemon configuration
      ansible.builtin.slurp:
        path: /etc/docker/daemon.json
      register: docker_daemon_slurp

    - name: Parse the current Docker daemon configuration
      ansible.builtin.set_fact:
        docker_daemon_existing_config: "{{ docker_daemon_slurp.content | b64decode | from_json }}"
  rescue:
    - name: Ignore an unreadable or invalid Docker daemon configuration
      ansible.builtin.set_fact:
        docker_daemon_existing_config: {}
- name: Compose the effective Docker daemon configuration
  ansible.builtin.set_fact:
    docker_daemon_effective_config: >-
      {{
        (docker_daemon_existing_config | default({}))
        | combine(docker_daemon_config, recursive=True)
      }}
  when: common_enable_docker | default(false)
  tags:
    - docker

- name: Enforce bounded Docker json-file logs
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: "{{ docker_daemon_effective_config | to_nice_json }}"
    mode: "0644"
  notify: Restart Docker
  when: common_enable_docker | default(false)
  tags:
    - docker

- name: Ensure the docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  when: common_enable_docker | default(false)
  tags:
    - docker

- name: Ensure the target user can run Docker without sudo
  ansible.builtin.user:
    name: "{{ local_user }}"
    groups: docker
    append: true
  when: common_enable_docker | default(false)
  tags:
    - docker

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started
  when: common_enable_docker | default(false)
  tags:
    - docker
