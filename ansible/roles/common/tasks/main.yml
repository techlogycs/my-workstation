---
- name: Validate the host distribution and derive shared facts
  tags:
    - facts
  block:
    - name: Ensure this playbook only runs on Debian-derived hosts
      ansible.builtin.assert:
        that:
          - ansible_os_family == 'Debian'
          - ansible_distribution in supported_distributions
        fail_msg: This repository targets Pop!_OS and other Ubuntu-derived hosts.

    - name: Merge feature flag overrides with defaults
      ansible.builtin.set_fact:
        common_feature_flags: >-
          {{ feature_flags_defaults | combine(feature_flags | default({}), recursive=True) }}
        common_known_feature_flags: "{{ feature_flags_defaults.keys() | list }}"

    - name: Normalize runtime-only feature selection
      ansible.builtin.set_fact:
        common_only_features: >-
          {{
            (
              (dotfiles_only_features | default('')).split(',')
              if (dotfiles_only_features | default('')) is string
              else (dotfiles_only_features | default([]))
            )
            | map('trim')
            | reject('equalto', '')
            | unique
            | list
          }}

    - name: Ensure runtime-only feature selection is valid
      ansible.builtin.assert:
        that:
          - >-
            common_only_features
            | difference(common_known_feature_flags)
            | length == 0
        fail_msg: >-
          dotfiles_only_features only accepts known feature flags.

    - name: Derive selective run facts
      ansible.builtin.set_fact:
        common_selective_feature_run: "{{ common_only_features | length > 0 }}"

    - name: Normalize feature flags to string modes
      ansible.builtin.set_fact:
        common_feature_mode_desktop_tools: >-
          {{
            'enabled' if 'desktop_tools' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.desktop_tools == true
            else 'disabled' if common_feature_flags.desktop_tools == false
            else common_feature_flags.desktop_tools
          }}
        common_feature_mode_clip_win: >-
          {{
            'enabled' if 'clip_win' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.clip_win == true
            else 'disabled' if common_feature_flags.clip_win == false
            else common_feature_flags.clip_win
          }}
        common_feature_mode_copyq: >-
          {{
            'enabled' if 'copyq' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.copyq == true
            else 'disabled' if common_feature_flags.copyq == false
            else common_feature_flags.copyq
          }}
        common_feature_mode_office_suite: >-
          {{
            'enabled' if 'office_suite' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.office_suite == true
            else 'disabled' if common_feature_flags.office_suite == false
            else common_feature_flags.office_suite
          }}
        common_feature_mode_vscode: >-
          {{
            'enabled' if 'vscode' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.vscode == true
            else 'disabled' if common_feature_flags.vscode == false
            else common_feature_flags.vscode
          }}
        common_feature_mode_brave: >-
          {{
            'enabled' if 'brave' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.brave == true
            else 'disabled' if common_feature_flags.brave == false
            else common_feature_flags.brave
          }}
        common_feature_mode_thunderbird: >-
          {{
            'enabled' if 'thunderbird' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.thunderbird == true
            else 'disabled' if common_feature_flags.thunderbird == false
            else common_feature_flags.thunderbird
          }}
        common_feature_mode_docker: >-
          {{
            'enabled' if 'docker' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.docker == true
            else 'disabled' if common_feature_flags.docker == false
            else common_feature_flags.docker
          }}
        common_feature_mode_nix: >-
          {{
            'enabled' if 'nix' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.nix == true
            else 'disabled' if common_feature_flags.nix == false
            else common_feature_flags.nix
          }}
        common_feature_mode_openvpn: >-
          {{
            'enabled' if 'openvpn' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.openvpn == true
            else 'disabled' if common_feature_flags.openvpn == false
            else common_feature_flags.openvpn
          }}
        common_feature_mode_git_credential_oauth: >-
          {{
            'enabled' if 'git_credential_oauth' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.git_credential_oauth == true
            else 'disabled' if common_feature_flags.git_credential_oauth == false
            else common_feature_flags.git_credential_oauth
          }}
        common_feature_mode_firefox: >-
          {{
            'enabled' if 'firefox' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.firefox == true
            else 'disabled' if common_feature_flags.firefox == false
            else common_feature_flags.firefox
          }}
        common_feature_mode_edge: >-
          {{
            'enabled' if 'edge' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.edge == true
            else 'disabled' if common_feature_flags.edge == false
            else common_feature_flags.edge
          }}
        common_feature_mode_virt_manager: >-
          {{
            'enabled' if 'virt_manager' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.virt_manager == true
            else 'disabled' if common_feature_flags.virt_manager == false
            else common_feature_flags.virt_manager
          }}
        common_feature_mode_file_manager_integration: >-
          {{
            'enabled' if 'file_manager_integration' in common_only_features
            else 'disabled' if common_only_features | length > 0
            else 'enabled' if common_feature_flags.file_manager_integration == true
            else 'disabled' if common_feature_flags.file_manager_integration == false
            else common_feature_flags.file_manager_integration
          }}

    - name: Ensure feature flag modes are valid
      ansible.builtin.assert:
        that:
          - common_feature_mode_desktop_tools in ['enabled', 'disabled', 'auto']
          - common_feature_mode_clip_win in ['enabled', 'disabled', 'auto']
          - common_feature_mode_copyq in ['enabled', 'disabled', 'auto']
          - common_feature_mode_office_suite in ['enabled', 'disabled', 'auto']
          - common_feature_mode_vscode in ['enabled', 'disabled', 'auto']
          - common_feature_mode_brave in ['enabled', 'disabled', 'auto']
          - common_feature_mode_thunderbird in ['enabled', 'disabled', 'auto']
          - common_feature_mode_docker in ['enabled', 'disabled', 'auto']
          - common_feature_mode_nix in ['enabled', 'disabled', 'auto']
          - common_feature_mode_openvpn in ['enabled', 'disabled', 'auto']
          - common_feature_mode_git_credential_oauth in ['enabled', 'disabled', 'auto']
          - common_feature_mode_firefox in ['enabled', 'disabled', 'auto']
          - common_feature_mode_edge in ['enabled', 'disabled', 'auto']
          - common_feature_mode_virt_manager in ['enabled', 'disabled', 'auto']
          - common_feature_mode_file_manager_integration in ['enabled', 'disabled', 'auto']
        fail_msg: All feature_flags values must be enabled, disabled, or auto.

    - name: Ensure the file manager integration mode is valid
      ansible.builtin.assert:
        that:
          - vscode_file_manager_integration in ['auto', 'nautilus', 'desktop-entry', 'disabled']
        fail_msg: vscode_file_manager_integration must be auto, nautilus, desktop-entry, or disabled.

    - name: Ensure the Nix install mode is valid
      ansible.builtin.assert:
        that:
          - nix_install_mode in ['single-user', 'multi-user']
        fail_msg: nix_install_mode must be single-user or multi-user.

    - name: Gather installed package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Derive host package and platform facts
      ansible.builtin.set_fact:
        common_deb_arch: "{{ deb_arch_map.get(ansible_architecture, 'amd64') }}"
        common_ubuntu_codename: >-
          {{
            ansible_lsb.codename
            | default(ansible_distribution_release, true)
          }}
        common_host_nix_system: "{{ nix_system_map.get(ansible_architecture, 'x86_64-linux') }}"
        common_home_manager_activation_link: "{{ local_home }}/.cache/home-manager-activation"
        common_nix_profiles_dir: "{{ local_home }}/.local/state/nix/profiles"
        common_home_manager_profile_path: >-
          {{ local_home }}/.local/state/nix/profiles/{{ nix_home_manager_profile_name }}
        common_home_manager_legacy_profile_path: "{{ local_home }}/.local/state/nix/profiles/home-manager"
        common_home_manager_state_legacy_profile_path: >-
          {{ local_home }}/.local/state/home-manager/profiles/home-manager
        common_home_manager_global_legacy_profile_path: >-
          /nix/var/nix/profiles/per-user/{{ local_user }}/home-manager
        common_nix_daemon_profile_script: /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
        common_has_gnome_desktop: >-
          {{
            gnome_desktop_package_candidates
            | select('in', ansible_facts.packages.keys() | list)
            | list
            | length > 0
          }}
        common_has_nautilus: "{{ 'nautilus' in ansible_facts.packages }}"
        common_has_network_manager: "{{ 'network-manager' in ansible_facts.packages }}"
        common_installed_clipboard_managers: >-
          {{
            clipboard_manager_package_candidates
            | select('in', ansible_facts.packages.keys() | list)
            | list
          }}
        common_installed_office_suites: >-
          {{
            office_suite_package_candidates
            | select('in', ansible_facts.packages.keys() | list)
            | list
          }}
        common_clipboard_manager_missing: >-
          {{
            (
              clipboard_manager_package_candidates
              | select('in', ansible_facts.packages.keys() | list)
              | list
              | length
            ) == 0
          }}
        common_current_desktop: >-
          {{
            (
              lookup('ansible.builtin.env', 'XDG_CURRENT_DESKTOP')
              ~ ' '
              ~ lookup('ansible.builtin.env', 'XDG_SESSION_DESKTOP')
            )
            | lower
            | trim
          }}

    - name: Derive Clip-Win release facts
      ansible.builtin.set_fact:
        common_clip_win_deb_checksum: >-
          {{ clip_win_release_deb_checksums.get(common_deb_arch, '') }}
        common_clip_win_deb_url: >-
          https://github.com/techlogycs/clip-win/releases/download/v{{
          clip_win_version }}/clip-win_{{ clip_win_version }}_{{ common_deb_arch
          }}.deb

    - name: Derive Git Credential Manager release facts
      ansible.builtin.set_fact:
        common_gcm_release_arch: >-
          {{ gcm_release_arch_map.get(common_deb_arch, '') }}
        common_gcm_deb_checksum: >-
          {{ gcm_release_deb_checksums.get(common_deb_arch, '') }}
        common_gcm_package_filename: >-
          gcm-linux-{{ gcm_release_arch_map.get(common_deb_arch, '') }}-{{
          gcm_version }}.deb
        common_gcm_deb_url: >-
          https://github.com/git-ecosystem/git-credential-manager/releases/download/v{{
          gcm_version }}/gcm-linux-{{
          gcm_release_arch_map.get(common_deb_arch, '') }}-{{ gcm_version }}.deb

    - name: Derive nix flake reference
      ansible.builtin.set_fact:
        common_nix_flake_ref: >-
          {{ dotfiles_repo }}/nix#homeConfigurations.{{ common_host_nix_system }}.activationPackage

    - name: Derive feature enablement facts
      ansible.builtin.set_fact:
        common_enable_vscode: "{{ common_feature_mode_vscode != 'disabled' }}"
        common_enable_brave: "{{ common_feature_mode_brave != 'disabled' }}"
        common_enable_thunderbird: "{{ common_feature_mode_thunderbird != 'disabled' }}"
        common_enable_docker: "{{ common_feature_mode_docker != 'disabled' }}"
        common_enable_nix: "{{ common_feature_mode_nix != 'disabled' }}"
        common_enable_openvpn: >-
          {{
            common_feature_mode_openvpn == 'enabled'
            or (
              common_feature_mode_openvpn == 'auto'
              and common_has_network_manager
            )
          }}
        common_enable_git_credential_oauth: "{{ common_feature_mode_git_credential_oauth != 'disabled' }}"
        common_enable_firefox: "{{ common_feature_mode_firefox != 'disabled' }}"
        common_enable_edge: "{{ common_feature_mode_edge != 'disabled' }}"
        common_enable_virt_manager: "{{ common_feature_mode_virt_manager != 'disabled' }}"
        common_openvpn_packages: >-
          {{
            openvpn_core_packages
            + (
              openvpn_network_manager_packages
              if (
                common_feature_mode_openvpn == 'enabled'
                or (
                  common_feature_mode_openvpn == 'auto'
                  and common_has_network_manager
                )
              )
              else []
            )
          }}
        common_flatpak_apps: >-
          {{
            ([] if common_selective_feature_run else distro_flatpak_apps.get(ansible_distribution, []))
            + ([ 'org.mozilla.Thunderbird' ] if common_feature_mode_thunderbird != 'disabled' else [])
          }}
        common_enable_file_manager_integration: >-
          {{
            common_feature_mode_file_manager_integration == 'enabled'
            or (
              common_feature_mode_file_manager_integration == 'auto'
              and common_feature_mode_vscode != 'disabled'
            )
          }}
        common_run_role_apt_repositories: >-
          {{
            (not common_selective_feature_run)
            or (
              common_only_features
              | intersect(['vscode', 'brave', 'docker', 'edge', 'copyq', 'git_credential_oauth'])
              | length > 0
            )
          }}
        common_run_role_system: >-
          {{
            (not common_selective_feature_run)
            or (
              common_only_features
              | intersect([
                'vscode',
                'desktop_tools',
                'clip_win',
                'copyq',
                'office_suite',
                'thunderbird',
                'docker',
                'openvpn',
                'git_credential_oauth',
                'firefox',
                'edge'
              ])
              | length > 0
            )
          }}
        common_run_role_desktop_apps: >-
          {{
            (not common_selective_feature_run)
            or (
              common_only_features
              | intersect(['vscode', 'brave'])
              | length > 0
            )
          }}
        common_run_role_flatpak: >-
          {{
            (not common_selective_feature_run)
            or 'thunderbird' in common_only_features
          }}
        common_run_role_docker: >-
          {{
            (not common_selective_feature_run)
            or 'docker' in common_only_features
          }}
        common_run_role_virt_manager: >-
          {{
            (not common_selective_feature_run)
            or 'virt_manager' in common_only_features
          }}
        common_run_role_file_manager: >-
          {{
            (not common_selective_feature_run)
            or 'file_manager_integration' in common_only_features
          }}
        common_run_role_nix: >-
          {{
            (not common_selective_feature_run)
            or 'nix' in common_only_features
          }}
        common_apt_desktop_packages: >-
          {{
            distro_desktop_packages.get(ansible_distribution, [])
            if (
              common_feature_mode_desktop_tools == 'enabled'
              or (common_feature_mode_desktop_tools == 'auto' and common_has_gnome_desktop)
            )
            else []
          }}
        common_install_clip_win: >-
          {{
            common_feature_mode_clip_win == 'enabled'
            or (
              common_feature_mode_clip_win == 'auto'
              and common_clipboard_manager_missing
            )
          }}
        common_install_copyq: >-
          {{
            (
              common_feature_mode_copyq == 'enabled'
              or (
                common_feature_mode_copyq == 'auto'
                and common_clipboard_manager_missing
              )
            )
            and not (
              common_feature_mode_clip_win == 'enabled'
              or (
                common_feature_mode_clip_win == 'auto'
                and common_clipboard_manager_missing
              )
            )
          }}
        common_install_libreoffice: >-
          {{
            common_feature_mode_office_suite == 'enabled'
            or (
              common_feature_mode_office_suite == 'auto'
              and (
                office_suite_package_candidates
                | select('in', ansible_facts.packages.keys() | list)
                | list
                | length
              ) == 0
            )
          }}

    - name: Derive dependent feature facts
      ansible.builtin.set_fact:
        common_enable_secret_service: >-
          {{
            (
              common_has_gnome_desktop
              or 'pop' in common_current_desktop
              or 'cosmic' in common_current_desktop
            )
            and (common_enable_vscode or common_enable_git_credential_oauth)
          }}

    - name: Derive secret service package facts
      ansible.builtin.set_fact:
        common_secret_service_packages: >-
          {{
            gnome_secret_service_packages
            if common_enable_secret_service
            else []
          }}

    - name: Derive file manager integration facts
      ansible.builtin.set_fact:
        common_use_nautilus_scripts: >-
          {{
            common_enable_file_manager_integration
            and common_enable_vscode
            and vscode_file_manager_integration != 'disabled'
            and (vscode_file_manager_integration == 'nautilus'
              or (vscode_file_manager_integration == 'auto' and 'nautilus' in ansible_facts.packages))
          }}
        common_use_desktop_entry: >-
          {{
            common_enable_file_manager_integration
            and common_enable_vscode
            and vscode_file_manager_integration != 'disabled'
            and (vscode_file_manager_integration == 'desktop-entry'
              or (vscode_file_manager_integration == 'auto' and 'nautilus' not in ansible_facts.packages))
          }}
        common_clip_win_is_gnome_family: >-
          {{
            'gnome' in common_current_desktop
            or 'unity' in common_current_desktop
            or 'pop' in common_current_desktop
          }}
        common_clip_win_is_cosmic: "{{ 'cosmic' in common_current_desktop }}"
