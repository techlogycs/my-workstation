---
- name: Uninstall conflicting Docker packages (docker.io / containerd / runc)
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc
    state: absent
    purge: true
    autoremove: true
  when: common_enable_docker
  tags:
    - packages
    - system

- name: Remove native Thunderbird package after migrating to Flatpak
  ansible.builtin.apt:
    name: thunderbird
    state: absent
    purge: true
    autoremove: true
  when: common_enable_thunderbird
  tags:
    - packages
    - system
    - thunderbird

- name: Install baseline APT packages
  ansible.builtin.apt:
    name: >-
      {{
        apt_base_packages
        + common_apt_desktop_packages
        + common_secret_service_packages
        + ([ 'acl', 'wl-clipboard', 'xclip' ] if common_install_clip_win else [])
        + ([ 'copyq', 'copyq-plugins' ] if common_install_copyq else [])
        + ([ 'libreoffice' ] if common_install_libreoffice else [])
        + ([ 'firefox' ] if common_enable_firefox else [])
        + ([ 'microsoft-edge-stable' ] if common_enable_edge else [])
        + ([
            'docker-ce',
            'docker-ce-cli',
            'containerd.io',
            'docker-buildx-plugin',
            'docker-compose-plugin'
          ] if common_enable_docker else [])
        + ([ 'flatpak' ] if common_flatpak_apps | length > 0 else [])
      }}
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: not common_selective_feature_run
  tags:
    - packages
    - system

- name: Install selective APT feature packages
  ansible.builtin.apt:
    name: >-
      {{
        common_apt_desktop_packages
        + common_secret_service_packages
        + ([ 'acl', 'wl-clipboard', 'xclip' ] if common_install_clip_win else [])
        + ([ 'copyq', 'copyq-plugins' ] if common_install_copyq else [])
        + ([ 'libreoffice' ] if common_install_libreoffice else [])
        + ([ 'firefox' ] if common_enable_firefox else [])
        + ([ 'microsoft-edge-stable' ] if common_enable_edge else [])
        + ([
            'docker-ce',
            'docker-ce-cli',
            'containerd.io',
            'docker-buildx-plugin',
            'docker-compose-plugin'
          ] if common_enable_docker else [])
        + ([ 'flatpak' ] if common_flatpak_apps | length > 0 else [])
      }}
    state: present
    update_cache: true
    cache_valid_time: 3600
  when:
    - common_selective_feature_run
    - >-
      common_apt_desktop_packages | length > 0
      or common_secret_service_packages | length > 0
      or common_install_clip_win
      or common_install_copyq
      or common_install_libreoffice
      or common_enable_firefox
      or common_enable_edge
      or common_enable_docker
      or common_flatpak_apps | length > 0
  tags:
    - packages
    - system

- name: Install OpenVPN workstation packages
  ansible.builtin.apt:
    name: "{{ common_openvpn_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
  when: common_enable_openvpn and common_openvpn_packages | length > 0
  tags:
    - openvpn
    - packages
    - system

- name: Ensure Git Credential Manager native packages are available for this architecture
  ansible.builtin.assert:
    that:
      - common_gcm_release_arch | length > 0
      - common_gcm_deb_checksum | length > 0
    fail_msg: Git Credential Manager publishes Debian packages only for amd64 and arm64.
  when: common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - git

- name: Remove git-credential-oauth after migrating to Git Credential Manager
  ansible.builtin.apt:
    name: git-credential-oauth
    state: absent
    purge: true
    autoremove: true
  when: common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - git

- name: Download the pinned Git Credential Manager Debian package
  ansible.builtin.get_url:
    url: "{{ common_gcm_deb_url }}"
    dest: "/tmp/{{ common_gcm_package_filename }}"
    mode: "0644"
    force: false
    checksum: "{{ common_gcm_deb_checksum }}"
  when: common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - git

- name: Install Git Credential Manager from the pinned upstream Debian package
  ansible.builtin.apt:
    deb: "/tmp/{{ common_gcm_package_filename }}"
    state: present
    update_cache: true
  when: common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - git

- name: Remove the legacy git-credential-oauth managed Git config block
  ansible.builtin.blockinfile:
    path: "{{ local_home }}/.gitconfig"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: git-credential-oauth"
    state: absent
    create: true
    mode: "0644"
  become: true
  become_user: "{{ local_user }}"
  when: common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - git

- name: Configure Git Credential Manager as the global Git credential helper
  ansible.builtin.blockinfile:
    path: "{{ local_home }}/.gitconfig"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: git-credential-manager"
    block: |
      [credential]
        helper =
        helper = /usr/local/bin/git-credential-manager
        credentialStore = secretservice
    create: true
    mode: "0644"
  become: true
  become_user: "{{ local_user }}"
  when: common_enable_git_credential_oauth
  tags:
    - packages
    - system
    - git

- name: Report when Clip-Win auto mode defers to an existing clipboard manager
  ansible.builtin.debug:
    msg: >-
      Skipping Clip-Win because the system already has a clipboard manager installed:
      {{ common_installed_clipboard_managers | join(', ') }}.
  when:
    - common_feature_mode_clip_win == 'auto'
    - not common_install_clip_win
  changed_when: false
  tags:
    - packages
    - system

- name: Report when LibreOffice auto mode defers to an existing office suite
  ansible.builtin.debug:
    msg: >-
      Skipping LibreOffice because the system already has an office suite installed:
      {{ common_installed_office_suites | join(', ') }}.
  when:
    - common_feature_mode_office_suite == 'auto'
    - not common_install_libreoffice
  changed_when: false
  tags:
    - packages
    - system

- name: Ensure the login shell is Zsh for the target user
  ansible.builtin.user:
    name: "{{ local_user }}"
    shell: /usr/bin/zsh
  when: not common_selective_feature_run
  tags:
    - shell
    - system

# Clip-Win install and setup
- name: Include Clip-Win setup tasks
  ansible.builtin.import_tasks: clip_win.yml
  when: common_install_clip_win
  tags:
    - clip-win

# CopyQ legacy config setup (Win+V shortcut)
- name: Include CopyQ config tasks
  ansible.builtin.import_tasks: copyq.yml
  when: common_install_copyq
  tags:
    - copyq
