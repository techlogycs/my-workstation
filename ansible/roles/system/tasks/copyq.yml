---
- name: Ensure CopyQ config directory exists
  ansible.builtin.file:
    path: "{{ local_home }}/.config/copyq"
    state: directory
    mode: "0700"
  when: common_install_copyq
  tags:
    - copyq

- name: Install CopyQ config with Win+V shortcut
  ansible.builtin.copy:
    src: "{{ dotfiles_repo }}/dotfiles/copyq.conf"
    dest: "{{ local_home }}/.config/copyq/copyq.conf"
    mode: "0600"
    owner: "{{ local_user }}"
  when: common_install_copyq
  tags:
    - copyq
