---
- name: Install Nix with the Determinate Systems installer
  ansible.builtin.shell: |
    set -Eeuo pipefail
    curl -fsSL https://install.determinate.systems/nix | sh -s -- install linux --no-confirm
  args:
    creates: /nix
    executable: /bin/bash
  when: common_enable_nix
  tags:
    - nix

- name: Ensure the Home Manager activation cache directory exists
  become: false
  ansible.builtin.file:
    path: "{{ local_home }}/.cache"
    state: directory
    mode: "0755"
  when: common_enable_nix
  tags:
    - nix

- name: Build the Home Manager activation package from the pinned flake
  become: false
  ansible.builtin.shell: |
    set -Eeuo pipefail

    if [[ -f /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh ]]; then
      source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
    elif [[ -f "$HOME/.nix-profile/etc/profile.d/nix.sh" ]]; then
      source "$HOME/.nix-profile/etc/profile.d/nix.sh"
    elif ! command -v nix >/dev/null 2>&1; then
      echo "Unable to locate the Nix profile script or nix binary." >&2
      exit 1
    fi

    nix build --impure --extra-experimental-features 'nix-command flakes' \
      '{{ common_nix_flake_ref }}' \
      --out-link '{{ common_home_manager_activation_link }}'
  args:
    executable: /bin/bash
  environment:
    DOTFILES_USER: "{{ local_user }}"
    DOTFILES_HOME: "{{ local_home }}"
    NIX_SYSTEM: "{{ common_host_nix_system }}"
  changed_when: false
  when: common_enable_nix
  tags:
    - nix

- name: Activate the Home Manager profile
  become: false
  ansible.builtin.command:
    cmd: "{{ common_home_manager_activation_link }}/activate"
  changed_when: false
  when: common_enable_nix
  tags:
    - nix
